name: Release Draft

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0

      - name: Build release
        run: bash build_release.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: Release/lazyripent.7z
          draft: true
          generate_release_notes: true